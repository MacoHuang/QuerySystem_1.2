<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建物資料管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        
        .form-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }
        
        .btn-info {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }
        
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-controls {
                justify-content: center;
            }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 1);
        }
        
        .form-group input:read-only {
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            color: #6c757d;
            cursor: not-allowed;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .file-input {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input label {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 0;
            font-weight: normal;
        }
        
        .file-input label:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .current-number {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
            font-size: 12px;
        }
        
        .current-date {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
            font-size: 12px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        
        .data-table th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        
        .data-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 15px;
        }
        
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .status-success {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
        }
        
        .status-error {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }
        
        .status-info {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* 特殊欄位樣式 */
        .form-group-special {
            position: relative;
        }
        
        .photo-preview {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 建物資料管理系統</h1>
            <p>專業房地產物件管理平台</p>
        </div>
                
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋編號、物件名稱或地址...">
            <button class="btn" onclick="searchRecords()">搜尋</button>
            <button class="btn" onclick="clearSearch()">清除</button>
        </div>
        
        <div id="dataTableContainer" class="hidden">
            <h3>📋 資料列表</h3>
            <table class="data-table" id="dataTable">
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>物件</th>
                        <th>名稱</th>
                        <th>地址</th>
                        <th>總價/租金</th>
                        <th>更新日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                </tbody>
            </table>
        </div>

        <form id="dataForm">
            <div class="form-grid">
                <!-- Row 1 -->
                <div class="form-group form-group-special">
                    <label for="number">編號 *</label>
                    <input type="text" id="number" name="number" readonly>
                    <div class="current-number" id="currentNumber">目前編號: A001</div>
                </div>
                
                <div class="form-group">
                    <label for="object">物件 *</label>
                    <input type="text" id="object" name="object" required>
                </div>
                
                <div class="form-group">
                    <label for="name">名稱 *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <!-- Row 2 -->
                <div class="form-group">
                    <label for="contractType">合約類別</label>
                    <select id="contractType" name="contractType">
                        <option value="">請選擇</option>
                        <option value="買賣">買賣</option>
                        <option value="租賃">租賃</option>
                        <option value="預售">預售</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="region">地區</label>
                    <input type="text" id="region" name="region">
                </div>
                
                <div class="form-group">
                    <label for="building">建物</label>
                    <input type="text" id="building" name="building">
                </div>
                
                <!-- Row 3 -->
                <div class="form-group">
                    <label for="form">形態</label>
                    <select id="form" name="form">
                        <option value="">請選擇</option>
                        <option value="公寓">公寓</option>
                        <option value="大廈">大廈</option>
                        <option value="透天">透天</option>
                        <option value="套房">套房</option>
                        <option value="別墅">別墅</option>
                        <option value="店面">店面</option>
                        <option value="辦公">辦公</option>
                        <option value="廠房">廠房</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="layout">格局</label>
                    <input type="text" id="layout" name="layout" placeholder="例: 3房2廳2衛">
                </div>
                
                <div class="form-group">
                    <label for="floor">樓層</label>
                    <input type="text" id="floor" name="floor" placeholder="例: 5F/12F">
                </div>
                
                <!-- Row 4 -->
                <div class="form-group">
                    <label for="address">地址</label>
                    <input type="text" id="address" name="address">
                </div>
                
                <div class="form-group">
                    <label for="googleLocation">Google定位</label>
                    <input type="url" id="googleLocation" name="googleLocation" placeholder="Google Maps 連結">
                </div>
                
                <div class="form-group">
                    <label for="price">總價/租金</label>
                    <input type="number" id="price" name="price" placeholder="單位: 萬元/月">
                </div>
                
                <!-- Row 5 -->
                <div class="form-group">
                    <label for="landArea">地坪</label>
                    <input type="number" id="landArea" name="landArea" step="0.01" placeholder="單位: 坪">
                </div>
                
                <div class="form-group">
                    <label for="totalArea">總建坪</label>
                    <input type="number" id="totalArea" name="totalArea" step="0.01" placeholder="單位: 坪">
                </div>
                
                <div class="form-group">
                    <label for="orientation">座向</label>
                    <select id="orientation" name="orientation">
                        <option value="">請選擇</option>
                        <option value="東">東</option>
                        <option value="西">西</option>
                        <option value="南">南</option>
                        <option value="北">北</option>
                        <option value="東南">東南</option>
                        <option value="東北">東北</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                    </select>
                </div>
                
                <!-- Row 6 -->
                <div class="form-group">
                    <label for="parking">車位</label>
                    <select id="parking" name="parking">
                        <option value="">請選擇</option>
                        <option value="有">有</option>
                        <option value="無">無</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="parkingNumber">車位編號</label>
                    <input type="text" id="parkingNumber" name="parkingNumber">
                </div>
                
                <div class="form-group">
                    <label for="utilities">水電</label>
                    <select id="utilities" name="utilities">
                        <option value="">請選擇</option>
                        <option value="正常">正常</option>
                        <option value="需整理">需整理</option>
                        <option value="無">無</option>
                    </select>
                </div>
                
                <!-- Row 7 -->
                <div class="form-group">
                    <label for="roadAccess">臨路</label>
                    <input type="text" id="roadAccess" name="roadAccess" placeholder="例: 8米巷道">
                </div>
                
                <div class="form-group">
                    <label for="frontWidth">面寬</label>
                    <input type="number" id="frontWidth" name="frontWidth" step="0.1" placeholder="單位: 米">
                </div>
                
                <div class="form-group">
                    <label for="completionDate">建物完成日</label>
                    <input type="date" id="completionDate" name="completionDate">
                </div>
                
                <!-- Row 8 -->
                <div class="form-group">
                    <label for="contact">聯絡人</label>
                    <input type="text" id="contact" name="contact">
                </div>
                
                <div class="form-group form-group-special">
                    <label for="photos">照片</label>
                    <div class="file-input">
                        <input type="file" id="photos" name="photos" multiple accept="image/*">
                        <label for="photos">📷 選擇照片檔案</label>
                    </div>
                    <div class="photo-preview" id="photoPreview"></div>
                </div>
                
                <div class="form-group">
                    <label for="contractStart">合約(起)</label>
                    <input type="date" id="contractStart" name="contractStart">
                </div>
                
                <!-- Row 9 -->
                <div class="form-group">
                    <label for="contractEnd">合約(迄)</label>
                    <input type="date" id="contractEnd" name="contractEnd">
                </div>
                
                <div class="form-group form-group-special">
                    <label for="updateDate">更新日</label>
                    <input type="text" id="updateDate" name="updateDate" readonly>
                    <div class="current-date" id="currentDate">目前日期: 2024/08/11</div>
                </div>
                
                <!-- 空白欄位以維持對齊 -->
                <div class="form-group">
                </div>
                
                <!-- 備註事項 - 佔滿整行 -->
                <div class="form-group full-width">
                    <label for="remarks">備註事項</label>
                    <textarea id="remarks" name="remarks" placeholder="輸入相關備註資訊..."></textarea>
                </div>
            </div>
        </form>
        
        <div class="form-controls">
            <button class="btn btn-success" onclick="newRecord()">📝 新增資料</button>
            <button class="btn btn-info" onclick="loadData()">📊 載入資料</button>
            <button class="btn btn-warning" onclick="saveRecord()">💾 儲存資料</button>
            <button class="btn btn-danger" onclick="deleteRecord()">🗑️ 刪除資料</button>
        </div>
    </div>
    
    <div class="status-indicator" id="statusIndicator"></div>
    
    <script>
        // 全域變數
        let currentData = [];
        let nextNumber = 1;
        let editingIndex = -1;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentInfo();
            // 先載入一些示例資料
            initializeWithSampleData();
        });
        
        // 初始化示例資料
        function initializeWithSampleData() {
            currentData = [
                {
                    number: 'A001',
                    object: '住宅大樓',
                    name: '信義帝寶',
                    region: '信義區',
                    address: '台北市信義區松智路1號',
                    price: 8800,
                    updateDate: '2024/08/11'
                },
                {
                    number: 'A002',
                    object: '透天別墅',
                    name: '陽明山莊',
                    region: '北投區',
                    address: '台北市北投區陽明山路100號',
                    price: 3500,
                    updateDate: '2024/08/10'
                }
            ];
            
            nextNumber = currentData.length + 1;
            updateCurrentInfo();
            displayDataTable();
        }
        
        // 更新目前資訊
        function updateCurrentInfo() {
            const today = new Date();
            const dateString = today.getFullYear() + '/' + 
                              String(today.getMonth() + 1).padStart(2, '0') + '/' + 
                              String(today.getDate()).padStart(2, '0');
            
            document.getElementById('currentDate').textContent = `目前日期: ${dateString}`;
            document.getElementById('updateDate').value = dateString;
            
            const numberString = 'A' + String(nextNumber).padStart(3, '0');
            document.getElementById('currentNumber').textContent = `目前編號: ${numberString}`;
            document.getElementById('number').value = numberString;
        }
        
        // 新增記錄
        function newRecord() {
            document.getElementById('dataForm').reset();
            editingIndex = -1;
            updateCurrentInfo();
            document.getElementById('photoPreview').textContent = '';
            showStatus('準備新增資料', 'success');
        }
        
        // 載入資料
        function loadData() {
            showStatus('載入資料中...', 'info');
            
            // 模擬載入
            setTimeout(() => {
                displayDataTable();
                showStatus('資料載入完成', 'success');
            }, 500);
        }
        
        // 儲存記錄
        function saveRecord() {
            const form = document.getElementById('dataForm');
            const formData = new FormData(form);
            
            // 驗證必填欄位
            if (!formData.get('object') || !formData.get('name')) {
                showStatus('請填寫必填欄位', 'error');
                return;
            }
            
            showStatus('儲存資料中...', 'info');
            
            // 模擬儲存過程
            setTimeout(() => {
                const recordData = {};
                for (let [key, value] of formData.entries()) {
                    recordData[key] = value;
                }
                
                if (editingIndex >= 0) {
                    // 更新現有記錄
                    currentData[editingIndex] = recordData;
                    showStatus('資料更新成功', 'success');
                } else {
                    // 新增記錄
                    currentData.push(recordData);
                    nextNumber++;
                    updateCurrentInfo();
                    showStatus('資料新增成功', 'success');
                }
                
                displayDataTable();
            }, 800);
        }
        
        // 刪除記錄
        function deleteRecord() {
            if (editingIndex >= 0) {
                if (confirm('確定要刪除這筆資料嗎？')) {
                    currentData.splice(editingIndex, 1);
                    displayDataTable();
                    newRecord();
                    showStatus('資料刪除成功', 'success');
                }
            } else {
                showStatus('請先選擇要刪除的資料', 'error');
            }
        }
        
        // 搜尋記錄
        function searchRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!searchTerm) {
                displayDataTable();
                return;
            }
            
            const filteredData = currentData.filter(record => 
                (record.number && record.number.toLowerCase().includes(searchTerm)) ||
                (record.object && record.object.toLowerCase().includes(searchTerm)) ||
                (record.name && record.name.toLowerCase().includes(searchTerm)) ||
                (record.address && record.address.toLowerCase().includes(searchTerm))
            );
            
            displayDataTable(filteredData);
            showStatus(`找到 ${filteredData.length} 筆符合的資料`, 'success');
        }
        
        // 清除搜尋
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayDataTable();
            showStatus('已清除搜尋條件', 'info');
        }
        
        // 顯示資料表格
        function displayDataTable(data = currentData) {
            const tableBody = document.getElementById('dataTableBody');
            const tableContainer = document.getElementById('dataTableContainer');
            
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableContainer.classList.add('hidden');
                return;
            }
            
            tableContainer.classList.remove('hidden');
            
            data.forEach((record, index) => {
                const actualIndex = currentData.indexOf(record);
                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td>${record.number || '-'}</td>
                    <td>${record.object || '-'}</td>
                    <td>${record.name || '-'}</td>
                    <td>${record.address || record.region || '-'}</td>
                    <td>${record.price ? record.price + '萬' : '-'}</td>
                    <td>${record.updateDate || '-'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-info" onclick="editRecord(${actualIndex})">✏️ 編輯</button>
                        </div>
                    </td>
                `;
            });
        }
        
        // 編輯記錄
        function editRecord(index) {
            if (index < 0 || index >= currentData.length) return;
            
            const record = currentData[index];
            editingIndex = index;
            
            // 填入表單資料
            Object.keys(record).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.value = record[key] || '';
                }
            });
            
            showStatus('載入編輯資料', 'success');
            
            // 滾動到表單頂部
            document.querySelector('.form-grid').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 顯示狀態訊息
        function showStatus(message, type) {
            const indicator = document.getElementById('statusIndicator');
            indicator.textContent = message;
            indicator.className = `status-indicator status-${type}`;
            indicator.style.display = 'block';
            
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 3000);
        }
        
        // 檔案處理
        document.getElementById('photos').addEventListener('change', function(e) {
            const files = e.target.files;
            const preview = document.getElementById('photoPreview');
            
            if (files.length > 0) {
                preview.textContent = `已選擇 ${files.length} 個檔案`;
                showStatus(`已選擇 ${files.length} 個照片檔案`, 'success');
            } else {
                preview.textContent = '';
            }
        });
        
        // Enter鍵搜尋功能
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRecords();
            }
        });
        
        // Google Sheets API 相關函數
        
        // 新增資料到 Google Sheets
        async function appendSheetData(recordData) {
            const values = [Object.values(recordData)];
            
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}:append?valueInputOption=RAW&key=${API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    values: values
                })
            });
            
            if (!response.ok) {
                throw new Error('新增資料到 Google Sheets 失敗');
            }
            
            return response.json();
        }
        
        // 更新整個 Google Sheets 資料
        async function updateSheetData() {
            // 準備標題行
            const headers = [
                'number', 'object', 'name', 'contractType', 'region', 'building', 
                'form', 'layout', 'floor', 'address', 'googleLocation', 'price',
                'landArea', 'totalArea', 'orientation', 'parking', 'parkingNumber',
                'utilities', 'roadAccess', 'frontWidth', 'completionDate', 'contact',
                'photos', 'contractStart', 'contractEnd', 'updateDate', 'remarks'
            ];
            
            // 準備資料行
            const values = [headers];
            currentData.forEach(record => {
                const row = headers.map(header => record[header] || '');
                values.push(row);
            });
            
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?valueInputOption=RAW&key=${API_KEY}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    values: values
                })
            });
            
            if (!response.ok) {
                throw new Error('更新 Google Sheets 資料失敗');
            }
            
            return response.json();
        }
        
        // 驗證 Google Sheets API 連接
        async function validateSheetsConnection() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?key=${API_KEY}`);
                return response.ok;
            } catch (error) {
                console.error('Google Sheets API 連接驗證失敗:', error);
                return false;
            }
        }
        
        // 初始化 Google Sheets（如果是空的試算表）
        async function initializeGoogleSheet() {
            const headers = [
                'number', 'object', 'name', 'contractType', 'region', 'building', 
                'form', 'layout', 'floor', 'address', 'googleLocation', 'price',
                'landArea', 'totalArea', 'orientation', 'parking', 'parkingNumber',
                'utilities', 'roadAccess', 'frontWidth', 'completionDate', 'contact',
                'photos', 'contractStart', 'contractEnd', 'updateDate', 'remarks'
            ];
            
            const values = [headers];
            
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sheet1!A1?valueInputOption=RAW&key=${API_KEY}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        values: values
                    })
                });
                
                if (response.ok) {
                    showStatus('Google Sheets 初始化完成', 'success');
                } else {
                    throw new Error('Google Sheets 初始化失敗');
                }
            } catch (error) {
                console.error('Google Sheets 初始化失敗:', error);
                showStatus('Google Sheets 初始化失敗', 'error');
            }
        }
    </script>
</body>
