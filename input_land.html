<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土地資料管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        
        .form-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align: center;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }
        
        .btn-info {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }
        
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-controls {
                justify-content: center;
            }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 1);
        }
        
        .form-group input:read-only {
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            color: #6c757d;
            cursor: not-allowed;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .file-input {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input label {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 0;
        }
        
        .file-input label:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .current-number {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }
        
        .current-date {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        
        .data-table th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        
        .data-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 15px;
        }
        
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .status-success {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
        }
        
        .status-error {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏜️ 土地資料管理</h1>
            <p>Google Sheets API 整合版本</p>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋編號、物件名稱或地址...">
            <button class="btn" onclick="searchRecords()">搜尋</button>
            <button class="btn" onclick="clearSearch()">清除</button>
        </div>

        <div id="dataTableContainer" class="hidden">
            <h3>📋 資料列表</h3>
            <table class="data-table" id="dataTable">
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>物件</th>
                        <th>名稱</th>
                        <th>地區</th>
                        <th>總價/租金</th>
                        <th>更新日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                </tbody>
            </table>
        </div><br>
        
        <form id="dataForm">
            <h3>📝 資料輸入</h3><br>
            <div class="form-grid">
                <!-- 第一欄 -->
                <div class="form-group">
                    <label for="number">編號 *</label>
                    <input type="text" id="number" name="number" readonly>
                    <!--<div class="current-number" id="currentNumber">目前編號: A001</div>-->
                </div>
                
                <div class="form-group">
                    <label for="object">物件 *</label>
                    <input type="text" id="object" name="object" required>
                </div>
                
                <div class="form-group">
                    <label for="name">名稱 *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="contractType">合約類別</label>
                    <select id="contractType" name="contractType">
                        <option value="">請選擇</option>
                        <option value="買賣">買賣</option>
                        <option value="租賃">租賃</option>
                        <option value="預售">預售</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="region">地區</label>
                    <input type="text" id="region" name="region">
                </div>
                
                <div class="form-group">
                    <label for="building">建物</label>
                    <input type="text" id="building" name="building">
                </div>
                
                <div class="form-group">
                    <label for="form">形態</label>
                    <select id="form" name="form">
                        <option value="">請選擇</option>
                        <option value="公寓">公寓</option>
                        <option value="大廈">大廈</option>
                        <option value="華廈">華廈</option>
                        <option value="透天">透天</option>
                        <option value="別墅">別墅</option>
                        <option value="店面">店面</option>
                        <option value="辦公">辦公</option>
                        <option value="廠房">廠房</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="layout">格局</label>
                    <input type="text" id="layout" name="layout" placeholder="例: 3房2廳2衛">
                </div>
                
                <div class="form-group">
                    <label for="floor">樓層</label>
                    <input type="text" id="floor" name="floor" placeholder="例: 5F/12F">
                </div>
                
                <!-- 第二欄 -->
                <div class="form-group">
                    <label for="address">地址</label>
                    <input type="text" id="address" name="address">
                </div>
                
                <div class="form-group">
                    <label for="googleLocation">Google定位</label>
                    <input type="url" id="googleLocation" name="googleLocation" placeholder="Google Maps 連結">
                </div>
                
                <div class="form-group">
                    <label for="price">總價/租金</label>
                    <input type="number" id="price" name="price" placeholder="單位: 萬元/月">
                </div>
                
                <div class="form-group">
                    <label for="landArea">地坪</label>
                    <input type="number" id="landArea" name="landArea" step="0.01" placeholder="單位: 坪">
                </div>
                
                <div class="form-group">
                    <label for="totalArea">總建坪</label>
                    <input type="number" id="totalArea" name="totalArea" step="0.01" placeholder="單位: 坪">
                </div>
                
                <div class="form-group">
                    <label for="orientation">座向</label>
                    <select id="orientation" name="orientation">
                        <option value="">請選擇</option>
                        <option value="東">東</option>
                        <option value="西">西</option>
                        <option value="南">南</option>
                        <option value="北">北</option>
                        <option value="東南">東南</option>
                        <option value="東北">東北</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="parking">車位</label>
                    <select id="parking" name="parking">
                        <option value="">請選擇</option>
                        <option value="有">有</option>
                        <option value="無">無</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="parkingNumber">車位編號</label>
                    <input type="text" id="parkingNumber" name="parkingNumber">
                </div>
                
                <div class="form-group">
                    <label for="utilities">水電</label>
                    <select id="utilities" name="utilities">
                        <option value="">請選擇</option>
                        <option value="正常">正常</option>
                        <option value="需整理">需整理</option>
                        <option value="無">無</option>
                    </select>
                </div>
                
                <!-- 第三欄 -->
                <div class="form-group">
                    <label for="roadAccess">臨路</label>
                    <input type="text" id="roadAccess" name="roadAccess" placeholder="例: 8米巷道">
                </div>
                
                <div class="form-group">
                    <label for="frontWidth">面寬</label>
                    <input type="number" id="frontWidth" name="frontWidth" step="0.1" placeholder="單位: 米">
                </div>
                
                <div class="form-group">
                    <label for="completionDate">建物完成日</label>
                    <input type="date" id="completionDate" name="completionDate">
                </div>
                
                <div class="form-group">
                    <label for="contact">聯繫人</label>
                    <input type="text" id="contact" name="contact">
                </div>
                
                <div class="form-group">
                    <label for="photos">照片</label>
                    <div class="file-input">
                        <input type="file" id="photos" name="photos" multiple accept="image/*">
                        <label for="photos">📷 選擇照片檔案</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="contractStart">合約(起)</label>
                    <input type="date" id="contractStart" name="contractStart">
                </div>
                
                <div class="form-group">
                    <label for="contractEnd">合約(迄)</label>
                    <input type="date" id="contractEnd" name="contractEnd">
                </div>
                
                <div class="form-group">
                    <label for="updateDate">更新日</label>
                    <input type="text" id="updateDate" name="updateDate" readonly>
                    <!--<div class="current-date" id="currentDate">目前日期: 2024/08/11</div>-->
                </div>
                
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="remarks">內部備註事項</label>
                    <textarea id="remarks" name="remarks" placeholder="輸入相關備註資訊..."></textarea>
                    <label for="remarks">備註事項</label>
                    <textarea id="remarks" name="remarks" placeholder="輸入相關備註資訊..."></textarea>
                </div>
            </div>
        </form>
        
        <div class="form-controls">
            <button class="btn btn-success" onclick="newRecord()">📝 新增資料</button>
            <!--<button class="btn btn-info" onclick="loadData()">📊 載入資料</button>-->
            <button class="btn btn-warning" onclick="saveRecord()">💾 儲存資料</button>
            <button class="btn btn-danger" onclick="deleteRecord()">🗑️ 刪除資料</button>
        </div>
    </div>
    
    <div class="status-indicator" id="statusIndicator"></div>
    
    <script>
        // 全域變數
        let currentData = [];
        let nextNumber = 1;
        let editingIndex = -1;
        
        // Google Sheets API 設定
        const SHEET_ID = 'YOUR_SHEET_ID_HERE'; // 請替換為您的 Google Sheets ID
        const API_KEY = 'YOUR_API_KEY_HERE';   // 請替換為您的 API Key
        const RANGE = 'Sheet1!A:Z';            // 資料範圍
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentInfo();
            loadData();
        });
        
        // 更新目前資訊
        function updateCurrentInfo() {
            const today = new Date();
            const dateString = today.getFullYear() + '/' + 
                              String(today.getMonth() + 1).padStart(2, '0') + '/' + 
                              String(today.getDate()).padStart(2, '0');
            
            document.getElementById('currentDate').textContent = `目前日期: ${dateString}`;
            document.getElementById('updateDate').value = dateString;
            
            const numberString = 'A' + String(nextNumber).padStart(3, '0');
            document.getElementById('currentNumber').textContent = `目前編號: ${numberString}`;
            document.getElementById('number').value = numberString;
        }
        
        // 新增記錄
        function newRecord() {
            document.getElementById('dataForm').reset();
            editingIndex = -1;
            updateCurrentInfo();
            showStatus('準備新增資料', 'success');
        }
        
        // 載入資料
        async function loadData() {
            showStatus('載入資料中...', 'info');
            
            try {
                // 這裡需要實作 Google Sheets API 呼叫
                // 暫時使用模擬資料
                setTimeout(() => {
                    currentData = [
                        {
                            number: 'A001',
                            object: '住宅大樓',
                            name: '信義帝寶',
                            region: '信義區',
                            price: 8800,
                            updateDate: '2024/08/11'
                        },
                        {
                            number: 'A002',
                            object: '透天別墅',
                            name: '陽明山莊',
                            region: '北投區',
                            price: 3500,
                            updateDate: '2024/08/10'
                        }
                    ];
                    
                    nextNumber = currentData.length + 1;
                    updateCurrentInfo();
                    displayDataTable();
                    showStatus('資料載入完成', 'success');
                }, 1000);
                
            } catch (error) {
                console.error('載入資料失敗:', error);
                showStatus('載入資料失敗', 'error');
            }
        }
        
        // 儲存記錄
        async function saveRecord() {
            const form = document.getElementById('dataForm');
            const formData = new FormData(form);
            
            // 驗證必填欄位
            if (!formData.get('object') || !formData.get('name')) {
                showStatus('請填寫必填欄位', 'error');
                return;
            }
            
            showStatus('儲存資料中...', 'info');
            
            try {
                const recordData = {};
                for (let [key, value] of formData.entries()) {
                    recordData[key] = value;
                }
                
                if (editingIndex >= 0) {
                    // 更新現有記錄
                    currentData[editingIndex] = recordData;
                    showStatus('資料更新成功', 'success');
                } else {
                    // 新增記錄
                    currentData.push(recordData);
                    nextNumber++;
                    updateCurrentInfo();
                    showStatus('資料新增成功', 'success');
                }
                
                displayDataTable();
                
                // 這裡需要實作實際的 Google Sheets API 儲存
                
            } catch (error) {
                console.error('儲存資料失敗:', error);
                showStatus('儲存資料失敗', 'error');
            }
        }
        
        // 刪除記錄
        function deleteRecord() {
            if (editingIndex >= 0) {
                if (confirm('確定要刪除這筆資料嗎？')) {
                    currentData.splice(editingIndex, 1);
                    displayDataTable();
                    newRecord();
                    showStatus('資料刪除成功', 'success');
                }
            } else {
                showStatus('請先選擇要刪除的資料', 'error');
            }
        }
        
        // 搜尋記錄
        function searchRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                displayDataTable();
                return;
            }
            
            const filteredData = currentData.filter(record => 
                record.number.toLowerCase().includes(searchTerm) ||
                record.object.toLowerCase().includes(searchTerm) ||
                record.name.toLowerCase().includes(searchTerm) ||
                record.address?.toLowerCase().includes(searchTerm)
            );
            
            displayDataTable(filteredData);
            showStatus(`找到 ${filteredData.length} 筆符合的資料`, 'success');
        }
        
        // 清除搜尋
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayDataTable();
        }
        
        // 顯示資料表格
        function displayDataTable(data = currentData) {
            const tableBody = document.getElementById('dataTableBody');
            const tableContainer = document.getElementById('dataTableContainer');
            
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableContainer.classList.add('hidden');
                return;
            }
            
            tableContainer.classList.remove('hidden');
            
            data.forEach((record, index) => {
                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td>${record.number}</td>
                    <td>${record.object}</td>
                    <td>${record.name}</td>
                    <td>${record.region || '-'}</td>
                    <td>${record.price ? record.price + '萬' : '-'}</td>
                    <td>${record.updateDate}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-info" onclick="editRecord(${currentData.indexOf(record)})">✏️ 編輯</button>
                        </div>
                    </td>
                `;
            });
        }
        
        // 編輯記錄
        function editRecord(index) {
            if (index < 0 || index >= currentData.length) return;
            
            const record = currentData[index];
            editingIndex = index;
            
            // 填入表單資料
            Object.keys(record).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.value = record[key];
                }
            });
            
            showStatus('載入編輯資料', 'success');
            
            // 滾動到表單頂部
            document.querySelector('.form-grid').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 顯示狀態訊息
        function showStatus(message, type) {
            const indicator = document.getElementById('statusIndicator');
            indicator.textContent = message;
            indicator.className = `status-indicator status-${type}`;
            indicator.style.display = 'block';
            
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 3000);
        }
        
        // Google Sheets API 函數（需要進一步實作）
        async function callSheetsAPI(method, data) {
            // 這裡需要實作實際的 Google Sheets API 呼叫
            // 包括身份驗證、資料格式轉換等
            console.log('調用 Google Sheets API:', method, data);
        }
        
        // 檔案處理
        document.getElementById('photos').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                showStatus(`已選擇 ${files.length} 個檔案`, 'success');
            }
        });
    </script>
